<span id="cartHeadCount" style="display:none"></span><span id="cartSubtotal" style="display:none"></span><span id="cartTotal" style="display:none"></span><span id="cartInstallments" style="display:none"></span><span id="cartEmpty" style="display:none"></span><span id="cartFoot" style="display:none"></span><ul id="cartItems" style="display:none"></ul>

<script src="js/mock-data.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script><script src="js/app.js"></script><script src="js/premium.js"></script>
<script>
const ol = document.getElementById('ordersList');
ol.innerHTML = ORDERS.map(o => `
  <a href="pedido-detalhe.html?id=${o.id}" class="order-card">
    <div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
        <strong style="font-family:var(--font-mono);letter-spacing:.08em">${o.number}</strong>
        <span class="badge ${getStatusBadge(o.status)}">${o.statusLabel}</span>
      </div>
      <div style="font-size:.82rem;color:var(--muted)">${formatDate(o.date)} • ${o.payment} • ${o.items.length} ${o.items.length===1?'item':'itens'}</div>
      <div class="order-card-items mt-1">${o.items.map(i=>`<img src="${i.image}" alt="${i.name}" />`).join('')}</div>
    </div>
    <div style="text-align:right">
      <span class="price" style="font-size:1.6rem">${formatPrice(o.total)}</span>
      ${o.tracking ? `<div style="font-size:.72rem;color:var(--info);margin-top:4px"><i class="fas fa-truck"></i> ${o.tracking}</div>` : ''}
    </div>
  </a>
`).join('');
</script>
