<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clientes — Admin BLACKLINE</title>
<link rel="icon" type="image/png" href="assets/img/logo/blackline-logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="css/variables.css" /><link rel="stylesheet" href="css/base.css" /><link rel="stylesheet" href="css/components.css" /><link rel="stylesheet" href="css/layout.css" /><link rel="stylesheet" href="css/admin.css" />
</head>
<body class="admin-body">

<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar"></aside>

  <main class="admin-main">
    <div class="admin-topbar" id="adminTopbar"></div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-card-icon" style="background:var(--yellow-10);color:var(--yellow)"><i class="fas fa-users"></i></div><div class="stat-card-value" id="totalCustomers">0</div><div class="stat-card-label">TOTAL DE CLIENTES</div></div>
      <div class="stat-card"><div class="stat-card-icon" style="background:var(--success-dim);color:var(--success)"><i class="fas fa-user-plus"></i></div><div class="stat-card-value">12</div><div class="stat-card-label">NOVOS NO MÊS</div></div>
      <div class="stat-card"><div class="stat-card-icon" style="background:var(--info-dim);color:var(--info)"><i class="fas fa-crown"></i></div><div class="stat-card-value">3</div><div class="stat-card-label">CLIENTES VIP</div></div>
      <div class="stat-card"><div class="stat-card-icon" style="background:var(--warning-dim);color:var(--warning)"><i class="fas fa-dollar-sign"></i></div><div class="stat-card-value">R$ 952</div><div class="stat-card-label">GASTO MÉDIO</div></div>
    </div>

    <!-- Search -->
    <div style="display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap">
      <div style="flex:1;min-width:240px;position:relative">
        <input class="input" placeholder="Buscar por nome, email ou telefone..." style="padding-left:42px" id="searchClient" />
        <i class="fas fa-search" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted)"></i>
      </div>
      <select class="catalog-sort"><option>Todos</option><option>VIP (4+ pedidos)</option><option>Sem pedidos</option></select>
      <button class="btn btn-ghost"><i class="fas fa-download"></i> EXPORTAR</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead><tr><th>Cliente</th><th>Email</th><th>Telefone</th><th>Pedidos</th><th>Total gasto</th><th>Cliente desde</th><th>Ações</th></tr></thead>
        <tbody id="clientsTable"></tbody>
      </table>
    </div>
  </main>
</div>

<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg"></span></div>

<script src="js/mock-data.js"></script><script src="js/orders.js"></script>
<script src="js/admin-shared.js"></script>
<script>
renderAdminSidebar('clientes');
renderAdminTopbar('Clientes', '<button class="btn btn-primary btn-sm"><i class="fas fa-user-plus"></i> NOVO CLIENTE</button>');

document.getElementById('totalCustomers').textContent = CUSTOMERS.length;

function renderClients() {
  const search = document.getElementById('searchClient').value.toLowerCase();
  const items = CUSTOMERS.filter(c => {
    if (search && !c.name.toLowerCase().includes(search) && !c.email.toLowerCase().includes(search) && !c.phone.includes(search)) return false;
    return true;
  });

  document.getElementById('clientsTable').innerHTML = items.map(c => {
    const isVip = c.orders >= 3;
    const initials = c.name.split(' ').map(n=>n[0]).join('').substring(0,2);
    return `
    <tr>
      <td><div style="display:flex;align-items:center;gap:12px">
        <div class="avatar avatar-sm">${initials}</div>
        <div><strong>${c.name}</strong>${isVip ? ' <span class="badge badge-yellow" style="font-size:.55rem;padding:2px 6px;margin-left:4px">VIP</span>' : ''}</div>
      </div></td>
      <td><small>${c.email}</small></td>
      <td><small>${c.phone}</small></td>
      <td><strong>${c.orders}</strong> ${c.orders === 1 ? 'pedido' : 'pedidos'}</td>
      <td><strong style="color:var(--yellow)">${formatPrice(c.totalSpent)}</strong></td>
      <td><small class="text-muted">${formatDate(c.since)}</small></td>
      <td><div class="table-actions">
        <button class="view" title="Ver detalhes"><i class="fas fa-eye"></i></button>
        <button class="edit" title="Editar"><i class="fas fa-pen"></i></button>
        <a href="https://wa.me/${c.phone.replace(/\D/g,'')}" target="_blank" class="view" style="color:#25D366"><i class="fab fa-whatsapp"></i></a>
      </div></td>
    </tr>
  `;}).join('');
}

document.getElementById('searchClient').addEventListener('input', renderClients);
renderClients();
</script>
</body>
</html>
