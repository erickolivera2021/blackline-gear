<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <div class="nav-actions"><button class="theme-toggle" aria-label="Alternar tema"><i class="fas fa-moon icon icon-moon"></i><i class="fas fa-sun icon icon-sun"></i></button><a href="conta.html" class="btn-icon"><i class="far fa-user"></i></a><button class="nav-cart" id="openCart"><i class="fas fa-shopping-bag"></i><span class="nav-cart-count" id="cartCount">0</span></button><button class="nav-burger" id="burger"><span></span><span></span><span></span></button></div>
</div></nav>

<div class="mobile-menu" id="mobileMenu"><div class="mobile-menu-links"><a href="index.html">Início</a><a href="produtos.html">Produtos</a><a href="conta.html">Conta</a></div></div>

<div class="page-header"><div class="container">
  <div class="breadcrumb"><a href="index.html">Início</a><span class="sep">/</span><a href="conta.html">Conta</a><span class="sep">/</span><span>Desejos</span></div>

<section class="section">
  <div class="container">
    <div class="wishlist-grid" id="wishGrid"></div>
  </div>
</section>

<footer class="footer"><div class="container"><div class="footer-bottom" style="border:none"><p>© 2026 BLACKLINE GEAR</p></div></div></footer>
<div class="cart-overlay" id="cartOverlay"></div><aside class="cart-drawer" id="cartDrawer"><header class="cart-head"><h3>CARRINHO <span class="cart-head-count" id="cartHeadCount">(0)</span></h3><button class="cart-close" id="cartClose">×</button></header><div class="cart-body"><div class="empty-state" id="cartEmpty"><i class="fas fa-shopping-bag"></i><h3>VAZIO</h3><button class="btn btn-primary" id="cartContinue">CONTINUAR</button></div><ul class="cart-items" id="cartItems"></ul></div><footer class="cart-foot" id="cartFoot"><div class="cart-row"><span>Subtotal</span><strong id="cartSubtotal">R$0</strong></div><div class="cart-row total"><span>Total</span><strong id="cartTotal">R$0</strong></div><div class="cart-installments" id="cartInstallments"></div><a href="checkout.html" class="btn btn-primary btn-full"><i class="fas fa-lock"></i> CHECKOUT</a><button class="cart-continue-link" id="cartContinueLink">← Continuar</button></footer></aside>
<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg"></span></div>

<script src="js/mock-data.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script><script src="js/app.js"></script><script src="js/premium.js"></script>
<script>
// Show all products as "wishlisted" (simulation)
const wg = document.getElementById('wishGrid');

function renderWishlist() {
  const items = wishlist.map(id => getProduct(id)).filter(Boolean);
  if (!items.length) {
    wg.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <i class="fas fa-heart"></i>
        <h3>LISTA DE DESEJOS VAZIA</h3>
        <p>Salve seus produtos favoritos para comprar depois.</p>
        <a href="produtos.html" class="btn btn-primary">EXPLORAR PRODUTOS</a>
      </div>`;
    return;
  }
  wg.innerHTML = items.map(p => `
    <article class="prod-card" data-prod="${p.id}">
      ${p.badge ? `<span class="prod-card-tag">${p.badge}</span>` : ''}
      <a href="${p.page}" class="prod-card-img"><img src="${p.image}" alt="${p.name}" loading="lazy" />
        <div class="prod-card-actions"><button class="add-to-cart" data-id="${p.id}"><i class="fas fa-shopping-bag"></i></button></div>
      </a>
      <div class="prod-card-body">
        <span class="prod-card-cat">${p.category}</span>
        <h3 class="prod-card-name"><a href="${p.page}">${p.shortName}</a></h3>
        <div class="stars mb-3">${'★'.repeat(p.rating)}</div>
        <div class="prod-card-bottom">
          <span class="prod-card-price">${formatPrice(p.price)}</span>
          <button data-wish="${p.id}" style="color:var(--danger);font-size:1.1rem;background:none;border:none;cursor:pointer" title="Remover dos desejos"><i class="fas fa-heart"></i></button>
        </div>
      </div>
    </article>
  `).join('');
}

renderWishlist();

// Re-render when wishlist is toggled
const origToggleWish = toggleWish;
window.toggleWish = function(id) {
  origToggleWish(id);
  renderWishlist();
};
</script>
</body>
</html>
