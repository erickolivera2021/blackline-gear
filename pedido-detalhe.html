<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Detalhe do Pedido — BLACKLINE GEAR</title>
<link rel="icon" type="image/png" href="assets/img/logo/blackline-logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="css/variables.css" /><link rel="stylesheet" href="css/base.css" /><link rel="stylesheet" href="css/components.css" /><link rel="stylesheet" href="css/layout.css" /><link rel="stylesheet" href="css/checkout.css" /><link rel="stylesheet" href="css/premium.css" />
</head>
<body>
<div class="scroll-progress" id="scrollProgress"></div>
<nav class="nav" id="nav"><div class="nav-inner">
  <a href="index.html" class="nav-logo"><img src="assets/img/logo/blackline-logo.png" alt="Blackline" height="34" /></a>
  <ul class="nav-links"><li><a href="index.html" class="nav-link">Início</a></li><li><a href="produtos.html" class="nav-link">Produtos</a></li><li><a href="conta.html" class="nav-link">Conta</a></li></ul>
  <div class="nav-actions"><button class="theme-toggle" aria-label="Alternar tema"><i class="fas fa-moon icon icon-moon"></i><i class="fas fa-sun icon icon-sun"></i></button><button class="nav-cart" id="openCart"><i class="fas fa-shopping-bag"></i><span class="nav-cart-count" id="cartCount">0</span></button><button class="nav-burger" id="burger"><span></span><span></span><span></span></button></div>
</div></nav>
<div class="mobile-overlay" id="mobileOverlay"></div>
<div class="mobile-menu" id="mobileMenu"><div class="mobile-menu-links"><a href="index.html">Início</a><a href="produtos.html">Produtos</a><a href="conta.html">Conta</a></div></div>

<div class="page-header"><div class="container">
  <div class="breadcrumb"><a href="index.html">Início</a><span class="sep">/</span><a href="conta.html">Conta</a><span class="sep">/</span><a href="pedidos.html">Pedidos</a><span class="sep">/</span><span id="bNum"></span></div>
  <h1 id="pageTitle">PEDIDO <span class="text-outline">#BL-1042</span></h1>
</div></div>

<section class="section">
  <div class="container" style="max-width:900px">
    <div id="orderContent"></div>
  </div>
</section>

<footer class="footer"><div class="container"><div class="footer-bottom" style="border:none"><p>© 2026 BLACKLINE GEAR</p></div></div></footer>
<div class="cart-overlay" id="cartOverlay"></div><aside class="cart-drawer" id="cartDrawer" style="display:none"></aside>
<span id="cartHeadCount" style="display:none"></span><span id="cartSubtotal" style="display:none"></span><span id="cartTotal" style="display:none"></span><span id="cartInstallments" style="display:none"></span><span id="cartEmpty" style="display:none"></span><span id="cartFoot" style="display:none"></span><ul id="cartItems" style="display:none"></ul>
<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg"></span></div>

<script src="js/mock-data.js"></script><script src="js/orders.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script><script src="js/app.js"></script><script src="js/premium.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const orderId = parseInt(params.get('id')) || 1042;
const order = ORDERS.find(o => o.id === orderId) || ORDERS[0];

document.getElementById('bNum').textContent = order.number;
document.getElementById('pageTitle').innerHTML = `PEDIDO <span class="text-outline">${order.number}</span>`;

const oc = document.getElementById('orderContent');
oc.innerHTML = `
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px">
    <div class="card" style="padding:24px;border-radius:var(--r-md)">
      <h3 class="heading-sm mb-3">STATUS</h3>
      <span class="badge ${getStatusBadge(order.status)}" style="font-size:.8rem;padding:6px 16px">${order.statusLabel}</span>
      <div class="mt-2" style="font-size:.85rem;color:var(--muted)">
        <div>Data: ${formatDate(order.date)}</div>
        <div>Pagamento: ${order.payment}</div>
        ${order.tracking ? `<div class="mt-1" style="color:var(--info)"><i class="fas fa-truck"></i> Rastreio: <strong>${order.tracking}</strong></div>` : ''}
      </div>
    </div>
    <div class="card" style="padding:24px;border-radius:var(--r-md)">
      <h3 class="heading-sm mb-3">ENDEREÇO</h3>
      <div style="font-size:.85rem;color:var(--muted);line-height:1.7">
        ${order.address.street}, ${order.address.number} ${order.address.complement ? '— '+order.address.complement : ''}<br>
        ${order.address.neighborhood} — ${order.address.city}/${order.address.state}<br>
        CEP: ${order.address.zip}
      </div>
    </div>
  </div>

  <h3 class="heading-sm mb-3">ITENS DO PEDIDO</h3>
  ${order.items.map(i => `
    <div style="display:flex;align-items:center;gap:16px;padding:16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:10px">
      <img src="${i.image}" alt="${i.name}" style="width:64px;height:64px;border-radius:var(--r-xs);object-fit:cover" />
      <div style="flex:1"><strong>${i.name}</strong><br><small class="text-muted">Qtd: ${i.qty}</small></div>
      <span style="font-family:var(--font-display);font-size:1.3rem;color:var(--yellow)">${formatPrice(i.price * i.qty)}</span>
    </div>
  `).join('')}

  <div class="card" style="padding:24px;border-radius:var(--r-md);margin-top:24px;max-width:400px;margin-left:auto">
    <div class="cart-summary-row"><span>Subtotal</span><strong>${formatPrice(order.subtotal)}</strong></div>
    <div class="cart-summary-row"><span>Frete</span><strong style="color:var(--success)">GRÁTIS</strong></div>
    ${order.discount ? `<div class="cart-summary-row"><span>Desconto${order.coupon?' ('+order.coupon+')':''}</span><strong style="color:var(--success)">-${formatPrice(order.discount)}</strong></div>` : ''}
    <div class="cart-summary-row total"><span>TOTAL</span><strong>${formatPrice(order.total)}</strong></div>
  </div>

  <div style="display:flex;gap:12px;margin-top:32px;justify-content:center">
    <a href="pedidos.html" class="btn btn-ghost"><i class="fas fa-arrow-left"></i> VOLTAR</a>
    <a href="https://wa.me/5511941834958?text=Olá!%20Preciso%20de%20ajuda%20com%20o%20pedido%20${order.number}" target="_blank" rel="noopener" class="btn btn-primary"><i class="fab fa-whatsapp"></i> AJUDA COM PEDIDO</a>
  </div>
`;
</script>
</body>
</html>
