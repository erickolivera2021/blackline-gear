<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pedidos — Admin BLACKLINE</title>
<link rel="icon" type="image/png" href="assets/img/logo/blackline-logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="css/variables.css" /><link rel="stylesheet" href="css/base.css" /><link rel="stylesheet" href="css/components.css" /><link rel="stylesheet" href="css/layout.css" /><link rel="stylesheet" href="css/admin.css" />
</head>
<body class="admin-body">

<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar"></aside>

  <main class="admin-main">
    <div class="admin-topbar" id="adminTopbar"></div>

    <!-- Quick stats -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-card-icon" style="background:var(--warning-dim);color:var(--warning)"><i class="fas fa-clock"></i></div><div class="stat-card-value" id="qtyPending">0</div><div class="stat-card-label">PENDENTES</div></div>
      <div class="stat-card"><div class="stat-card-icon" style="background:var(--success-dim);color:var(--success)"><i class="fas fa-check"></i></div><div class="stat-card-value" id="qtyPaid">0</div><div class="stat-card-label">PAGOS</div></div>
      <div class="stat-card"><div class="stat-card-icon" style="background:var(--info-dim);color:var(--info)"><i class="fas fa-truck"></i></div><div class="stat-card-value" id="qtyShipped">0</div><div class="stat-card-label">ENVIADOS</div></div>
      <div class="stat-card"><div class="stat-card-icon" style="background:var(--success-dim);color:var(--success)"><i class="fas fa-house"></i></div><div class="stat-card-value" id="qtyDelivered">0</div><div class="stat-card-label">ENTREGUES</div></div>
    </div>

    <!-- Filters -->
    <div style="display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap">
      <div style="flex:1;min-width:240px;position:relative">
        <input class="input" placeholder="Buscar por número ou cliente..." style="padding-left:42px" id="searchOrders" />
        <i class="fas fa-search" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted)"></i>
      </div>
      <select class="catalog-sort" id="statusFilter">
        <option value="">Todos status</option>
        <option value="pending">Pendentes</option><option value="paid">Pagos</option>
        <option value="shipped">Enviados</option><option value="delivered">Entregues</option>
        <option value="cancelled">Cancelados</option>
      </select>
      <select class="catalog-sort">
        <option>Últimos 30 dias</option><option>Últimos 7 dias</option><option>Hoje</option><option>Tudo</option>
      </select>
      <button class="btn btn-ghost"><i class="fas fa-download"></i> EXPORTAR CSV</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Pedido</th><th>Cliente</th><th>Data</th><th>Itens</th><th>Pagamento</th><th>Total</th><th>Status</th><th>Ações</th></tr>
        </thead>
        <tbody id="ordersTable"></tbody>
      </table>
    </div>
  </main>
</div>

<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg"></span></div>

<script src="js/mock-data.js"></script><script src="js/orders.js"></script>
<script src="js/admin-shared.js"></script>
<script>
renderAdminSidebar('pedidos');
renderAdminTopbar('Pedidos', '<button class="btn btn-ghost btn-sm"><i class="fas fa-filter"></i> FILTROS AVANÇADOS</button>');

document.getElementById('qtyPending').textContent = ORDERS.filter(o => o.status === 'pending').length;
document.getElementById('qtyPaid').textContent = ORDERS.filter(o => o.status === 'paid').length;
document.getElementById('qtyShipped').textContent = ORDERS.filter(o => o.status === 'shipped').length;
document.getElementById('qtyDelivered').textContent = ORDERS.filter(o => o.status === 'delivered').length;

function renderOrders() {
  const search = document.getElementById('searchOrders').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const items = ORDERS.filter(o => {
    if (search && !o.number.toLowerCase().includes(search) && !o.customer.name.toLowerCase().includes(search)) return false;
    if (status && o.status !== status) return false;
    return true;
  });

  document.getElementById('ordersTable').innerHTML = items.map(o => `
    <tr>
      <td><strong style="font-family:var(--font-mono);font-size:.82rem">${o.number}</strong></td>
      <td><div style="display:flex;align-items:center;gap:10px">
        <div class="avatar avatar-sm">${o.customer.name.split(' ').map(n=>n[0]).join('').substring(0,2)}</div>
        <div><strong>${o.customer.name}</strong><br><small class="text-muted">${o.customer.email}</small></div>
      </div></td>
      <td>${formatDate(o.date)}</td>
      <td>${o.items.length} ${o.items.length === 1 ? 'item' : 'itens'}</td>
      <td>${o.payment}</td>
      <td><strong style="color:var(--yellow)">${formatPrice(o.total)}</strong></td>
      <td><span class="badge ${getStatusBadge(o.status)}">${o.statusLabel}</span></td>
      <td><div class="table-actions">
        <a href="admin-pedido.html?id=${o.id}" class="view" title="Ver"><i class="fas fa-eye"></i></a>
        <button class="edit" title="Atualizar status" onclick="updateStatus(${o.id})"><i class="fas fa-pen"></i></button>
        <a href="https://wa.me/${o.customer.phone.replace(/\D/g,'')}?text=Olá!%20Sobre%20seu%20pedido%20${o.number}" target="_blank" class="view" title="WhatsApp" style="color:#25D366"><i class="fab fa-whatsapp"></i></a>
      </div></td>
    </tr>
  `).join('');
}

function updateStatus(id) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = 'Status atualizado!';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.getElementById('searchOrders').addEventListener('input', renderOrders);
document.getElementById('statusFilter').addEventListener('change', renderOrders);
renderOrders();
</script>
</body>
</html>
