<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pedido Confirmado — BLACKLINE GEAR</title>
<link rel="icon" type="image/png" href="assets/img/logo/blackline-logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="css/variables.css" /><link rel="stylesheet" href="css/base.css" /><link rel="stylesheet" href="css/components.css" /><link rel="stylesheet" href="css/layout.css" /><link rel="stylesheet" href="css/checkout.css" /><link rel="stylesheet" href="css/premium.css" />
</head>
<body>
<div class="checkout-nav"><div class="container checkout-logo">
  <a href="index.html"><img src="assets/img/logo/blackline-logo.png" alt="Blackline" height="30" /></a>
  <span class="checkout-secure"><i class="fas fa-check-circle" style="color:var(--success)"></i> Pedido confirmado</span>
</div></div>

<div class="success-page">
  <div>
    <div class="success-icon"><i class="fas fa-circle-check"></i></div>
    <h1 class="heading-xl">PEDIDO <span class="text-outline">CONFIRMADO!</span></h1>
    <p class="text-muted mt-2">Obrigado pela sua compra. Você receberá um email com os detalhes.</p>
    <div class="success-order-num" id="orderNum">#BL-1043</div>

    <div class="success-details" id="orderDetails">
      <div class="cart-summary-row"><span>Status</span><strong><span class="status-dot green"></span>Pago</strong></div>
      <div class="cart-summary-row"><span>Pagamento</span><strong>PIX</strong></div>
      <div class="cart-summary-row"><span>Frete</span><strong style="color:var(--success)">GRÁTIS (PAC)</strong></div>
      <div class="cart-summary-row"><span>Previsão</span><strong>5 a 8 dias úteis</strong></div>
      <div class="cart-summary-row total"><span>Total pago</span><strong id="orderTotal">R$ 579,00</strong></div>
    </div>

    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px">
      <a href="pedidos.html" class="btn btn-primary"><i class="fas fa-box"></i> MEUS PEDIDOS</a>
      <a href="index.html" class="btn btn-ghost"><i class="fas fa-house"></i> VOLTAR À LOJA</a>
    </div>

    <p style="margin-top:32px;font-size:.85rem;color:var(--muted)">
      Dúvidas? <a href="https://wa.me/5511941834958?text=Olá!%20Fiz%20um%20pedido%20e%20preciso%20de%20ajuda" target="_blank" rel="noopener" style="color:var(--yellow)"><i class="fab fa-whatsapp"></i> Fale conosco</a>
    </p>
  </div>
</div>

<script src="js/mock-data.js"></script>
<script>
const order = JSON.parse(localStorage.getItem('bl_last_order') || 'null');
if (order) {
  document.getElementById('orderNum').textContent = '#BL-' + order.id;
  document.getElementById('orderTotal').textContent = formatPrice(order.total);
}
</script>
</body>
</html>
